$schema: https://json-schema.org/draft/2020-12/schema
$id: source-of-truth.schema.yaml
title: Source Of Truth Config
type: object
additionalProperties: false
required:
  - version
  - kind
  - source_of_truth
  - read_policy
  - update_policy
  - handoff
  - status_values
properties:
  version:
    const: 1
  kind:
    const: source-of-truth
  source_of_truth:
    type: object
    additionalProperties: false
    required:
      - mode
      - default_required
      - providers
    properties:
      mode:
        type: string
        enum:
          - optional
          - required
          - disabled
      default_required:
        type: boolean
      providers:
        type: array
        items:
          type: object
          additionalProperties: false
          required:
            - id
            - type
            - enabled
          properties:
            id:
              type: string
            type:
              type: string
            enabled:
              type: boolean
            read:
              type: boolean
            update:
              type: boolean
            owner:
              type: string
            location:
              type: string
  read_policy:
    type: object
    additionalProperties: false
    required:
      - read_when_user_provides_source
      - read_when_plan_or_release_depends_on_source
      - require_exact_source_reference_in_artifacts
      - unavailable_source_status
    properties:
      read_when_user_provides_source:
        type: boolean
      read_when_plan_or_release_depends_on_source:
        type: boolean
      require_exact_source_reference_in_artifacts:
        type: boolean
      unavailable_source_status:
        type: string
        enum:
          - blocked
          - waived
          - not required
  update_policy:
    type: object
    additionalProperties: false
    required:
      - updates_belong_to_phase
      - require_update_evidence
      - require_user_request_or_config_for_external_write
      - if_update_cannot_be_performed
      - stale_source_blocks_ship_when_required
    properties:
      updates_belong_to_phase:
        type: string
        enum:
          - build
          - review
          - test
          - ship
      require_update_evidence:
        type: boolean
      require_user_request_or_config_for_external_write:
        type: boolean
      if_update_cannot_be_performed:
        type: string
        enum:
          - blocked_handoff_or_waiver
          - block_only
          - waive_only
      stale_source_blocks_ship_when_required:
        type: boolean
  handoff:
    type: object
    additionalProperties: false
    required:
      - required_when_blocked
      - copy_ready
      - required_fields
    properties:
      required_when_blocked:
        type: boolean
      copy_ready:
        type: boolean
      required_fields:
        type: array
        minItems: 1
        items:
          type: string
  status_values:
    type: array
    uniqueItems: true
    items:
      type: string
      enum:
        - updated
        - not required
        - blocked
        - waived
  extensions:
    type: object
    additionalProperties: true

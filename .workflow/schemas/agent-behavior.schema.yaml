$schema: https://json-schema.org/draft/2020-12/schema
$id: agent-behavior.schema.yaml
title: Agent Behavior Config
type: object
additionalProperties: false
required:
  - version
  - kind
  - canonical_source
  - lifecycle
  - pause_resume
  - evidence_policy
  - change_policy
  - waivers
  - dispatch
properties:
  version:
    const: 1
  kind:
    const: agent-behavior
  canonical_source:
    type: object
    additionalProperties: false
    required:
      - workflow_root
      - instructions_root
      - rule
    properties:
      workflow_root:
        type: string
      instructions_root:
        type: string
      rule:
        type: string
  task_classes:
    type: object
    additionalProperties: false
    properties:
      trivial:
        $ref: '#/$defs/task_class'
      standard:
        $ref: '#/$defs/task_class'
      complex:
        $ref: '#/$defs/task_class'
  lifecycle:
    type: object
    additionalProperties: false
    required:
      - default_mode
      - require_artifacts_for_standard_and_complex_work
      - allow_skipped_phase_with_waiver
      - artifact_chain
    properties:
      default_mode:
        type: string
        enum:
          - lightweight
          - standard
          - complex
      require_artifacts_for_standard_and_complex_work:
        type: boolean
      allow_skipped_phase_with_waiver:
        type: boolean
      artifact_chain:
        type: array
        minItems: 7
        items:
          type: object
          additionalProperties: false
          required:
            - artifact
            - phase
            - path
            - next_phase
          properties:
            artifact:
              type: string
              enum:
                - brief
                - plan
                - task
                - review
                - verify
                - ship
                - reflect
            phase:
              type: string
              enum:
                - think
                - plan
                - build
                - review
                - test
                - ship
                - reflect
            path:
              type: string
            next_phase:
              type: string
              enum:
                - plan
                - build
                - review
                - test
                - ship
                - reflect
                - done
  pause_resume:
    $ref: '#/$defs/boolean_policy_object'
  evidence_policy:
    $ref: '#/$defs/boolean_policy_object'
  change_policy:
    $ref: '#/$defs/boolean_policy_object'
  waivers:
    type: object
    additionalProperties: false
    required:
      - approvers
      - required_fields
      - cannot_waive_false_evidence
    properties:
      approvers:
        type: array
        minItems: 1
        items:
          type: string
      required_fields:
        type: array
        minItems: 1
        items:
          type: string
      cannot_waive_false_evidence:
        type: boolean
  dispatch:
    type: object
    additionalProperties: false
    required:
      - enabled
      - max_parallel_workstreams
      - require_independent_file_ownership
      - require_dispatch_log
      - merge_owner
    properties:
      enabled:
        type: string
        enum:
          - optional
          - disabled
          - required
      max_parallel_workstreams:
        type: integer
        minimum: 0
      require_independent_file_ownership:
        type: boolean
      require_dispatch_log:
        type: boolean
      merge_owner:
        type: string
  extensions:
    type: object
    additionalProperties: true
$defs:
  task_class:
    type: object
    additionalProperties: false
    required:
      - description
      - required_phases
      - skippable_phases
      - artifact_required
    properties:
      description:
        type: string
      classification_signals:
        type: array
        items:
          type: string
      required_phases:
        type: array
        items:
          type: string
          enum:
            - think
            - plan
            - build
            - review
            - test
            - ship
            - reflect
      skippable_phases:
        type: array
        items:
          type: string
          enum:
            - think
            - plan
            - build
            - review
            - test
            - ship
            - reflect
      skip_requires_waiver:
        type: boolean
      artifact_required:
        type: boolean
      note:
        type: string
  boolean_policy_object:
    type: object
    additionalProperties:
      oneOf:
        - type: boolean
        - type: array
          items:
            type: string
        - type: string
<!-- END FILE -->


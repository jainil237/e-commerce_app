version: 1
kind: domain

domain:
  name: ecommerce-platform
  summary: "Full-stack e-commerce platform for selling physical goods online, comprising a customer-facing storefront (Next.js), admin dashboard (Next.js), and REST API backend (Express + Prisma + MySQL). Supports product browsing, cart, checkout, order management, returns, and replacements."
  regulated: false
  glossary:
    - storefront (apps/web) — customer-facing Next.js shopping app
    - admin (apps/admin) — merchant/admin Next.js dashboard app
    - server (server/) — Express + Prisma REST API backend
    - shared (shared/) — shared TypeScript types, components, hooks, and utilities
    - RMA — Return Merchandise Authorization, the product return and replacement flow
    - order — a confirmed customer purchase tracked through fulfillment states
  preferred_terms: []
  discouraged_terms: []

constraints:
  product:
    - Do not introduce domain-specific behavior unless the user request or repo context requires it.
    - Treat compatibility, source authority, verification, and release impact as implicit requirements when material.
    - Do not modify payment or checkout logic (server/src/routes/webhook.routes.ts, checkout flows, Razorpay integration) without explicit user approval.
  safety:
    - Do not expose secrets, credentials, private tokens, API keys, or sensitive local paths in lifecycle artifacts.
    - Do not perform destructive actions without explicit user approval.
    - Do not claim external state without evidence.
    - Do not include environment variable values, connection strings, or authentication material in any artifact section.
    - Do not run destructive database commands (DROP, DELETE on production tables, irreversible migrations) without explicit user approval.
    - Do not push directly to main — always use a feature branch and open a PR.
    - Do not expose .env file contents in any written artifact, log, or summary.
  provider_neutrality:
    - Do not make any source, ticketing, hosting, CI, package, or deployment provider mandatory by default.
    - Use configured providers only when this config, another workflow config, or the user request enables them.

requirement_discovery:
  implicit_requirement_sources:
    - repo_profile
    - source_of_truth
    - verification
    - release
    - lifecycle_rules
    - compatibility
    - safety
  assumptions:
    require_ids: true
    id_prefix: A
    must_be_visible_in_brief: true
  questions:
    require_ids: true
    id_prefix: Q
    blocking_questions_go_to_orchestration_blockers: true

communication:
  default_audience: engineering
  tone: direct
  include_user_followups_when_blocked: true

extensions: {}

$schema: https://json-schema.org/draft/2020-12/schema
$id: verification.schema.yaml
title: Verification Config
type: object
additionalProperties: false
required:
  - version
  - kind
  - evidence_types
  - commands
  - command_policy
  - manual_qa
  - generated_output
  - skipped_checks
  - outcomes
properties:
  version:
    const: 1
  kind:
    const: verification
  evidence_types:
    type: array
    uniqueItems: true
    items:
      type: string
      enum:
        - command
        - manual
        - review
        - generated-output
        - source
        - release
        - waiver
  commands:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - command
        - cwd
        - required
        - phases
      properties:
        id:
          type: string
        command:
          type: string
        cwd:
          type: string
        required:
          type: boolean
        phases:
          type: array
          items:
            type: string
            enum:
              - plan
              - build
              - review
              - test
              - ship
        covers:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        timeout_seconds:
          type: integer
          minimum: 1
  command_policy:
    type: object
    additionalProperties: false
    required:
      - allow_discovered_commands
      - prefer_configured_commands
      - do_not_invent_commands
      - record_working_directory
      - record_not_run_as_risk
      - network_or_sandbox_failure_status
    properties:
      allow_discovered_commands:
        type: boolean
      prefer_configured_commands:
        type: boolean
      do_not_invent_commands:
        type: boolean
      record_working_directory:
        type: boolean
      record_not_run_as_risk:
        type: boolean
      network_or_sandbox_failure_status:
        type: string
        enum:
          - blocked
          - not run
  manual_qa:
    type: object
    additionalProperties: false
    required:
      - enabled
      - use_when_commands_cannot_prove_requirement
      - required_fields
    properties:
      enabled:
        type: boolean
      use_when_commands_cannot_prove_requirement:
        type: boolean
      required_fields:
        type: array
        minItems: 1
        items:
          type: string
  generated_output:
    type: object
    additionalProperties: false
    required:
      - enabled_when_configured_or_changed
      - require_source_mapping
      - require_command_or_inspection_method
      - source_only_inspection_is_not_enough
    properties:
      enabled_when_configured_or_changed:
        type: boolean
      require_source_mapping:
        type: boolean
      require_command_or_inspection_method:
        type: boolean
      source_only_inspection_is_not_enough:
        type: boolean
  skipped_checks:
    type: object
    additionalProperties: false
    required:
      - allowed_with_risk
      - required_fields
      - ship_impact_values
    properties:
      allowed_with_risk:
        type: boolean
      required_fields:
        type: array
        minItems: 1
        items:
          type: string
      ship_impact_values:
        type: array
        uniqueItems: true
        items:
          type: string
          enum:
            - yes
            - no
            - waiver-required
  outcomes:
    type: object
    additionalProperties: false
    required:
      - command
      - manual
      - coverage
      - sign_off
    properties:
      command:
        $ref: '#/$defs/outcome_list'
      manual:
        $ref: '#/$defs/outcome_list'
      coverage:
        $ref: '#/$defs/outcome_list'
      sign_off:
        type: array
        uniqueItems: true
        items:
          type: string
          enum:
            - ship
            - hold
            - hold-with-waiver
  extensions:
    type: object
    additionalProperties: true
$defs:
  outcome_list:
    type: array
    uniqueItems: true
    items:
      type: string